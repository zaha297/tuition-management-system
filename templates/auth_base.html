{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tuition Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#F6F2ED;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.auth-card{

width:100%;
max-width:450px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 10px 35px rgba(0,0,0,.08);

}

.logo{

font-size:30px;
font-weight:700;
text-align:center;
color:#6F4E37;

}

.subtitle{

text-align:center;
color:#8B7355;
margin-bottom:35px;

}

.btn-main{

background:#6F4E37;
color:white;
border:none;
width:100%;
padding:12px;
border-radius:10px;

}

.btn-main:hover{

background:#5C4033;
color:white;

}

</style>

</head>

<body>

<div class="auth-card">

<div class="logo">
Tuition Management
</div>

<p class="subtitle">
{% block title %}{% endblock %}
</p>

{% block content %}
{% endblock %}

</div>

</body>

</html>
