{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="table-card">

            <h2 class="mb-4">
                Edit Profile
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label>Username</label>

                    <input
                        type="text"
                        name="username"
                        value="{{ request.user.username }}"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        value="{{ request.user.email }}"
                        class="form-control">

                </div>

                <button class="btn btn-main">
                    Save Changes
                </button>

                <a href="{% url 'profile' %}" class="btn btn-outline-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
