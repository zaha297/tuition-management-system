{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="table-card">

            <h3 class="mb-4">
                {% if form.instance.pk %}
                    Edit Course
                {% else %}
                    Add Course
                {% endif %}
            </h3>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-main">
                    {% if form.instance.pk %}
                        Update Course
                    {% else %}
                        Save Course
                    {% endif %}
                </button>

                <a href="{% url 'course_list' %}" class="btn btn-outline-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
