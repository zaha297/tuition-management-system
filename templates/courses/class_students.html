{% extends 'base.html' %}

{% block content %}

<h2>{{ course.course_name }} - Students</h2>

<div class="table-card">

<table class="table table-hover">

<thead>

<tr>

<th>Username</th>

<th>Email</th>

</tr>

</thead>

<tbody>

{% for s in students %}

<tr>

<td>{{ s.student.username }}</td>

<td>{{ s.student.email }}</td>

</tr>

{% empty %}

<tr>

<td colspan="2" class="text-center">

No Students Enrolled

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
