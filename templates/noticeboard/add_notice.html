{% extends 'base.html' %}

{% block content %}

<div class="card">

    <div class="card-header">

        <h3>Add Notice</h3>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-main">
                Save Notice
            </button>

        </form>

    </div>

</div>

{% endblock %}
