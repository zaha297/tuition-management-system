{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="table-card">

            <h3 class="mb-4">

                {% if form.instance.pk %}
                    Edit Attendance
                {% else %}
                    Mark Attendance
                {% endif %}

            </h3>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="mt-4">

                    <button class="btn btn-main">

                        <i class="bi bi-check-circle"></i>

                        Save Attendance

                    </button>

                    <a href="{% url 'attendance_list' %}"
                       class="btn btn-outline-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
